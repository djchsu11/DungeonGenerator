name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Patch module.json manifest URLs
        run: |
          node -e "
            const fs=require('fs');
            const p='dist/module.json';
            const m=JSON.parse(fs.readFileSync(p,'utf8'));
            m.version=process.env.VERSION;
            const repo=process.env.GITHUB_REPOSITORY;
            m.url='https://github.com/'+repo;
            m.manifest='https://github.com/'+repo+'/releases/latest/download/module.json';
            m.download='https://github.com/'+repo+'/releases/download/v'+process.env.VERSION+'/module.zip';
            fs.writeFileSync(p, JSON.stringify(m,null,2));
          "
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Package
        run: |
          cd dist
          zip -r ../module.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.zip
            dist/module.json
          generate_release_notes: true
